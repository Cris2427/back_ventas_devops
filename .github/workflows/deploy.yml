name: CI/CD Back Ventas

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: ./Springboot-API-REST
          file: ./Springboot-API-REST/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Actualizar kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name devops-eks

      - name: Aplicar manifiestos de Kubernetes
        run: kubectl apply -f k8s/deployment.yaml

      - name: Forzar actualización de imagen y esperar rollout
        run: |
          kubectl rollout restart deployment/back-ventas
          kubectl rollout status deployment/back-ventas --timeout=120s
          
